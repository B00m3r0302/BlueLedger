# HTTPS-enabled Docker Compose configuration for security testing
services:
  mongodb:
    image: mongo:7.0
    container_name: sinamoa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: sinamoa-chemicals
    volumes:
      - mongodb_data:/data/db
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - sinamoa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sinamoa-backend
    restart: unless-stopped
    ports:
      - "5000:5000"  # HTTP fallback for downgrade testing
      - "5443:5443"  # HTTPS primary
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/sinamoa-chemicals?authSource=admin
      JWT_SECRET: your-super-secure-jwt-secret-key-change-in-production
      JWT_EXPIRE: 24h
      PORT: 5000
      HTTPS_PORT: 5443
      ENABLE_HTTPS: "true"
      ENABLE_HTTP_FALLBACK: "true"  # Enable both for testing
      FRONTEND_URL: https://localhost:3000
      BCRYPT_ROUNDS: 12
      SEED_DATABASE: "true"
    depends_on:
      - mongodb
    networks:
      - sinamoa-network
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sinamoa-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3443:3443"  # HTTPS frontend (if needed)
    environment:
      REACT_APP_API_URL: https://localhost:5443/api
      REACT_APP_USE_HTTPS: "true"
      REACT_APP_ENVIRONMENT: development
      HTTPS: "true"  # Enable HTTPS for React dev server
    depends_on:
      - backend
    networks:
      - sinamoa-network
    volumes:
      - ./frontend:/app
      - ./certs:/app/certs:ro
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  sinamoa-network:
    driver: bridge